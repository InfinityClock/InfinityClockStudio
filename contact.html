<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Initiate System Audit</title>
    <link rel="stylesheet" href="css/professional.css">
    <link rel="icon" href="assets/logo.png">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body style="background: var(--bg-soft);">

    <!-- Elite Navigation -->
    <nav class="nav-main" style="background: white; border-bottom: 1px solid var(--border-light);">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
            <a href="index.html" style="display: flex; align-items: center; gap: 0.875rem; text-decoration: none;">
                <img src="assets/logo.png" alt="logo" style="height: 40px;">
                <span style="font-family: 'Poppins', sans-serif; font-weight: 800; color: var(--brand-dark); font-size: 1.75rem; letter-spacing: -2px;">Infinity Clock</span>
            </a>
            <div style="display: flex; align-items: center; gap: 3.5rem;">
                <a href="contact.html" class="btn btn-primary" style="padding: 0.75rem 1.75rem; font-size: 0.9375rem;">Get Free Audit</a>
            </div>
        </div>
    </nav>

    <!-- Contact Hero -->
    <section style="padding: 140px 0 60px; text-align: center;">
        <div class="container">
            <h1 class="reveal" style="font-size: 4.5rem; letter-spacing: -3px; margin-bottom: 1.5rem;">Let’s talk about <br> <span class="text-gradient">your growth.</span></h1>
            <p class="reveal" style="font-size: 1.25rem; color: var(--text-muted); max-width: 650px; margin: 0 auto; line-height: 1.6;">Ready to automate your operations or build a high-performance storefront? Our engineering lead will review your brief within 24 hours.</p>
        </div>
    </section>

    <!-- Contact Form -->
    <section style="padding: 40px 0 160px;">
        <div class="container" style="max-width: 950px;">
            <div class="reveal card-saas" style="padding: 5rem; border-radius: 3rem; background: white;">
                <form style="display: flex; flex-direction: column; gap: 2.5rem;">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2.5rem;">
                        <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                            <label style="font-weight: 800; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.08em;">Full Name</label>
                            <input type="text" placeholder="John Doe" required style="padding: 1.125rem; border-radius: 12px; border: 1px solid var(--border-light); font-family: inherit; font-size: 1rem;">
                        </div>
                        <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                            <label style="font-weight: 800; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.08em;">Work Email</label>
                            <input type="email" placeholder="john@company.io" required style="padding: 1.125rem; border-radius: 12px; border: 1px solid var(--border-light); font-family: inherit; font-size: 1rem;">
                        </div>
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                        <label style="font-weight: 800; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.08em;">Operational Solution</label>
                        <select style="padding: 1.125rem; border-radius: 12px; border: 1px solid var(--border-light); font-family: inherit; font-size: 1rem; background: var(--bg-white);">
                            <option>High-Performance Web Engineering</option>
                            <option>Operational Admin Systems</option>
                            <option>Custom Automation Workflow</option>
                            <option>Timora OS Demo Request</option>
                        </select>
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                        <label style="font-weight: 800; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.08em;">Project Context</label>
                        <textarea rows="6" placeholder="Briefly describe the manual friction or scaling challenges you're currently facing..." style="padding: 1.125rem; border-radius: 12px; border: 1px solid var(--border-light); font-family: inherit; font-size: 1rem; resize: none;"></textarea>
                    </div>
                    <div style="display: flex; gap: 1.5rem; justify-content: space-between; align-items: center; margin-top: 2rem;">
                         <button type="submit" class="btn btn-primary" style="padding: 1.5rem 4rem; font-size: 1.125rem;">Initiate System Audit</button>
                         <p style="color: var(--text-muted); font-size: 0.8125rem; font-weight: 600; text-align: right; max-width: 300px;">Direct support: <br> <span style="color: var(--brand-dark);">hello@infinityclock.io</span></p>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer-enterprise">
        <div class="container" style="text-align: center; color: #475569;">
            <p>&copy; 2026 Infinity Clock Studio Inc. All rights reserved.</p>
        </div>
    </footer>

    <script>
        lucide.createIcons();
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if(entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
