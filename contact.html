<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Scale Your Operations</title>
    <link rel="stylesheet" href="css/professional.css">
    <link rel="icon" href="assets/logo.png">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body style="background: var(--bg-soft);">

    <!-- Navigation -->
    <nav class="nav-main" style="background: white;">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
            <a href="index.html" style="display: flex; align-items: center; gap: 0.75rem; text-decoration: none;">
                <img src="assets/logo.png" alt="logo" style="height: 36px;">
                <span style="font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; color: var(--brand-dark); font-size: 1.5rem; letter-spacing: -1px;">Infinity Clock</span>
            </a>
            <div class="nav-desktop" style="display: flex; align-items: center; gap: 3rem;">
                <a href="contact.html" class="btn btn-primary" style="padding: 0.6rem 1.5rem;">Get Free Audit</a>
            </div>
        </div>
    </nav>

    <!-- Contact Hero -->
    <section style="padding: 140px 0 60px; text-align: center;">
        <div class="container">
            <h1 class="reveal" style="font-size: 4rem; letter-spacing: -2px; margin-bottom: 1.5rem;">Let’s talk about <br> <span class="text-gradient">your growth.</span></h1>
            <p class="reveal" style="font-size: 1.25rem; color: var(--text-muted); max-width: 600px; margin: 0 auto; line-height: 1.6;">
                Ready to automate your operations or build a high-performance storefront? Fill out the brief below and our lead engineer will reach out.
            </p>
        </div>
    </section>

    <!-- Contact Form -->
    <section style="padding: 40px 0 120px;">
        <div class="container" style="max-width: 900px;">
            <div class="reveal" style="background: white; border-radius: 3rem; padding: 4rem; border: 1px solid var(--border-light); box-shadow: 0 40px 80px rgba(15, 23, 42, 0.05);">
                 <form style="display: flex; flex-direction: column; gap: 2rem;">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                        <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                            <label style="font-weight: 700; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.05em;">Full Name</label>
                            <input type="text" placeholder="John Doe" required style="padding: 1rem; border-radius: 10px; border: 1px solid var(--border-light); font-family: inherit; font-size: 1rem;">
                        </div>
                         <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                            <label style="font-weight: 700; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.05em;">Work Email</label>
                            <input type="email" placeholder="john@company.com" required style="padding: 1rem; border-radius: 10px; border: 1px solid var(--border-light); font-family: inherit; font-size: 1rem;">
                        </div>
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                         <label style="font-weight: 700; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.05em;">Solution Needed</label>
                         <select style="padding: 1rem; border-radius: 10px; border: 1px solid var(--border-light); font-family: inherit; font-size: 1rem; background: white;">
                             <option>Website Engineering</option>
                             <option>Operational Automation</option>
                             <option>Custom Enterprise Tool</option>
                             <option>Timora SaaS Beta</option>
                         </select>
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                         <label style="font-weight: 700; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.05em;">Brief Project Context</label>
                         <textarea rows="6" placeholder="Tell us about the operational friction you're facing..." style="padding: 1rem; border-radius: 10px; border: 1px solid var(--border-light); font-family: inherit; font-size: 1rem; resize: none;"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" style="padding: 1.25rem; font-size: 1.125rem;">Initiate System Audit</button>
                 </form>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer-saas">
        <div class="container">
             <div style="text-align: center; font-size: 0.875rem; color: #475569;">
                <p>&copy; 2026 Infinity Clock Studio Inc. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script>
        lucide.createIcons();
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if(entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
